{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cardiovascular Health Prediction</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #1e3a8a;
            background: url("https://helenataylorclinic.com/wp-content/uploads/2024/10/AdobeStock_620126328-1024x683-1.jpeg.webp") no-repeat center center fixed;
            background-size: cover;
        }

        /* Navbar */
        .navbar {
            background-color: rgba(30, 58, 138, 0.9);
            padding: 15px 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.25);
        }

        .navbar-brand {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff !important;
        }

        .nav-link {
            color: #dbeafe !important;
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 6px;
        }

        .nav-link:hover {
            background-color: #60a5fa;
            color: #fff !important;
        }

        /* Content */
        .content {
            padding: 40px 20px;
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }

        .main-content {
            border-radius: 15px;
            padding: 30px;
            max-width: 900px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.9);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 15px;
            background-color: rgba(30, 58, 138, 0.9);
            color: #fff;
            margin-top: 30px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'index' %}">Cardio Prediction</a>

            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'index' %}">🏠 Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'UserLogin' %}">User Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'AdminLogin' %}">Admin Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'UserRegisterForm' %}">Register</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="content">
        <div class="main-content">
            {% block contents %}
            {% endblock %}
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        © 2025 Cardiovascular Prediction System
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
