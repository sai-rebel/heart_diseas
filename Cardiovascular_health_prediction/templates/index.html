{% extends 'base.html' %}
{% block contents %} 
<style>
    body {
        margin: 0;
        padding: 0;
    }

    h1 {
        color:rgb(240, 248, 84);
        font-size: 2.5rem;
        font-family: 'Georgia', serif;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7);
        margin-bottom: 20px;
    }

    .info-box {
        background-color: rgba(0, 0, 0, 0.5);
        padding: 20px 30px;
        border-radius: 10px;
        color: white;
        max-width: 800px;
        margin: 0 auto;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    p {
        font-size: 1.2rem;
        line-height: 1.8;
        margin-bottom: 20px;
    }

    .btn-explore {
        padding: 10px 25px;
        font-size: 1.1rem;
        background-color: #28a745;
        border: none;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        transition: all 0.3s ease;
    }

    .btn-explore:hover {
        background-color: #218838;
        transform: scale(1.05);
    }

    .content-wrapper {
        text-align: center;
        padding: 30px 15px 0; /* Add top padding only */
    }
</style>

<div class="content-wrapper">
    <h1>Cardiovascular health prediction </h1>
    <div class="info-box">
        <p>
           The project aims to predict an individual's cardiovascular health status using machine learning algorithms based on medical and lifestyle-related input features.
        </p>
        <a href="{% url 'UserLogin' %}" class="btn-explore">Start Application</a>
    </div>
</div>
{% endblock %}
