{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prediction of Cardiovascular Health Status 
Using Machine Learning Algorithms  </title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" 
          integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous" />

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #1e3a8a;
            background: url("https://helenataylorclinic.com/wp-content/uploads/2024/10/AdobeStock_620126328-1024x683-1.jpeg.webp") no-repeat center center fixed;
            background-size: cover;
        }

        /* Navbar */
        .navbar {
            background-color: rgba(30, 58, 138, 0.85);
            padding: 15px 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.25);
        }
        .navbar-brand {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffffff !important;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .nav-link {
            color: #dbeafe !important;
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .nav-link:hover, .nav-link:focus {
            background-color: #60a5fa;
            color: #ffffff !important;
            text-decoration: none;
            transform: scale(1.05);
        }

        /* Main content */
        .content {
            padding: 40px 20px;
            margin-top: 20px;
            min-height: calc(100vh - 100px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .main-content {
            border-radius: 20px;
            padding: 40px 35px;
            max-width: 900px;
            width: 100%;
            color: #1e3a8a;
        }

        h1, h2, h3 {
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            margin-bottom: 1.2rem;
        }

        /* Buttons */
        .btn-primary, .btn-explore, .custom-btn {
            background: linear-gradient(135deg, #4ade80, #16a34a);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
            text-decoration: none;
        }

        .btn-primary:hover, .btn-explore:hover, .custom-btn:hover {
            background: linear-gradient(135deg, #22c55e, #15803d);
            transform: scale(1.05);
            color: #fff;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px 10px;
            color: #dbeafe;
            background-color: rgba(30, 58, 138, 0.9);
            position: relative;
            bottom: 0;
            width: 100%;
            font-weight: 500;
            box-shadow: inset 0 1px 4px rgba(255,255,255,0.1);
        }

        @media (max-width: 576px) {
            .main-content {
                padding: 25px 20px;
                margin: 0 10px;
            }
            .navbar-brand {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'index' %}">Cardiovascular health prediction</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'index' %}">🏠 Home</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'UserLogin' %}">🔑 User Login</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'AdminLogin' %}">🛠️ Admin Login</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'UserRegisterForm' %}">📝 Create Account</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="content">
    <div class="main-content">
        {% block contents %}
        {% endblock %}
    </div>
</div>

<footer>
    <p>&copy; 2025 Cardiovascular health prediction . All rights reserved.</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" 
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>

</body>
</html>
