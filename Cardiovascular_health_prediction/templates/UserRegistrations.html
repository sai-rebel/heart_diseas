{% extends 'base.html' %}
{% load static %}
{% block contents %}

<style>
    .register-container {
        max-width: 500px;
        height: 500px; /* Fixed height for scrollable area */
        background-color: rgba(7, 7, 7, 0.6);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        margin-top: -100px;
        overflow-y: auto; /* Enables vertical scrolling */
        padding: 30px;
        scroll-behavior: smooth;
    }

    .register-container::-webkit-scrollbar {
        width: 8px;
    }

    .register-container::-webkit-scrollbar-thumb {
        background-color: #888;
        border-radius: 10px;
    }

    .register-heading {
        text-align: center;
        font-size: 2.2rem;
        font-weight: 700;
        background: linear-gradient(45deg, #f59e0b, #ef4444);
        -webkit-background-clip: text;
        color: transparent;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        margin-bottom: 20px;
        text-transform: uppercase;
    }

    .form-control {
        border-radius: 8px;
        padding: 12px 15px;
        border: 1px solid #d1d5db;
        font-size: 1rem;
    }

    .form-control:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25);
    }

    .btn-register {
        background-color: #1e3a8a;
        border: none;
        border-radius: 10px;
        padding: 12px 20px;
        font-weight: 600;
        font-size: 1.05rem;
        width: 100%;
        transition: all 0.3s ease;
    }

    .btn-register:hover {
        background-color: #2563eb;
        transform: scale(1.02);
    }

    label {
        font-weight: 600;
        margin-top: 10px;
    }

    .form-group {
        margin-bottom: 15px;
    }
</style>

<div class="content">
    <div class="register-container">
        <h2 class="register-heading">📝 Register Here</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success text-center">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form action="{% url 'UserRegisterForm' %}" method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="name">👤 Name:</label>
                <input type="text" class="form-control" id="name" name="name" maxlength="100" required>
            </div>

            <div class="form-group">
                <label for="loginid">🆔 Login ID:</label>
                <input type="text" class="form-control" id="loginid" name="loginid" maxlength="100" required>
            </div>

            <div class="form-group">
                <label for="password">🔑 Password:</label>
                <input type="password" class="form-control" id="password" name="password" maxlength="100" required>
            </div>

            <div class="form-group">
                <label for="mobile">📱 Mobile:</label>
                <input type="text" class="form-control" id="mobile" name="mobile" maxlength="10" required>
            </div>

            <div class="form-group">
                <label for="email">📧 Email:</label>
                <input type="email" class="form-control" id="email" name="email" maxlength="100" required>
            </div>

            <div class="form-group">
                <label for="locality">🏘️ Locality:</label>
                <input type="text" class="form-control" id="locality" name="locality" maxlength="100">
            </div>

            <div class="form-group">
                <label for="address">🏠 Address:</label>
                <textarea class="form-control" id="address" name="address" maxlength="1000" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="city">🏙️ City:</label>
                <input type="text" class="form-control" id="city" name="city" maxlength="100">
            </div>

            <div class="form-group">
                <label for="state">🌐 State:</label>
                <input type="text" class="form-control" id="state" name="state" maxlength="100">
            </div>

            <br>
            <button type="submit" class="btn btn-register text-white">✅ Register</button>
        </form>
    </div>
</div>

{% endblock %}
