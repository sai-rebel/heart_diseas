{% extends 'users/userbase.html' %}
{% load static %}
{% block contents %}
<!DOCTYPE html>
<html>
<head>
    <title>Cardiovascular Health Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            padding: 40px;
        }
        h2 {
            color: #333;
        }
        form {
            background: white;
            padding: 20px;
            width: 400px;
            border: 1px solid #ccc;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }
        input[type="number"], input[type="submit"] {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 16px;
            font-size: 16px;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            background: #e1f7e1;
            color: green;
        }
    </style>
</head>
<body>
    <h2>Predict Cardiovascular Disease</h2>
    <form method="post" style="color: green;">
        {% csrf_token %}
        <label>Age (Years):</label>
        <input type="number" name="age" required>

        <label>Height (cm):</label>
        <input type="number" name="height" required>

        <label>Weight (kg):</label>
        <input type="number" name="weight" required>

        <label>Systolic BP (ap_hi):</label>
        <input type="number" name="ap_hi" required>

        <label>Diastolic BP (ap_lo):</label>
        <input type="number" name="ap_lo" required>

        <input type="submit" value="Predict">
    </form>

    {% if prediction %}
    <div class="result">
        <strong style="color: red;">Prediction:</strong> {{ prediction }}
    </div>
    {% endif %}
</body>
</html>
{% endblock %}
