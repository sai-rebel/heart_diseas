{% extends 'users/userbase.html' %}
{% block contents %}
<!DOCTYPE html>
<html>
<head>
    <title>Cardiovascular Health Training</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f7f7f7;
        }
        h2, h3, h4 {
            color: #333;
            margin-top: 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px 12px;
            text-align: center;
        }
        th {
            background-color: #f0f0f0;
        }
        .image-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        .image-grid img {
            max-width: 100%;
            height: auto;
            border: 1px solid #ddd;
            background-color: white;
            padding: 5px;
            box-shadow: 0px 2px 4px rgba(0,0,0,0.1);
            width: 45%;
        }
        .table-container {
            overflow-x: auto;
            background-color: white;
            padding: 10px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <h2>Cardiovascular Dataset Summary</h2>

    <h3>Model Accuracy Scores</h3>
    <div class="table-container" style="color: black;">
        {{ accuracy_table|safe }}
    </div>

</body>
</html>
{% endblock %}
