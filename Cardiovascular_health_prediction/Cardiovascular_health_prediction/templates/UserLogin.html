{% extends 'base.html' %}
{% load static %}
{% block contents %}

<style>
    .login-container {
        max-width: 450px;
        background-color: rgba(16, 16, 16, 0.6);
        border-radius: 20px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        padding: 40px 30px;
        margin-top: 10px;
    }

    .login-heading {
        text-align: center;
        font-size: 2.2rem;
        font-weight: 700;
        background: linear-gradient(45deg, #f59e0b, #ef4444);
        -webkit-background-clip: text;
        color: transparent;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        margin-bottom: 25px;
        text-transform: uppercase;
    }

    .form-control {
        border-radius: 8px;
        padding: 12px 15px;
        border: 1px solid #d1d5db;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25);
    }

    .btn-login {
        background-color: #1e3a8a;
        border: none;
        border-radius: 10px;
        padding: 12px 20px;
        font-weight: 600;
        font-size: 1.1rem;
        width: 100%;
        transition: all 0.3s ease;
    }

    .btn-login:hover {
        background-color: #2563eb;
        transform: scale(1.03);
    }

    .forgot-link {
        display: block;
        text-align: center;
        margin-top: 12px;
        font-size: 0.95rem;
        color: #2563eb;
        font-weight: 500;
    }

    .alert {
        margin-top: 15px;
        font-size: 0.95rem;
    }
</style>

<section class="content">
    <div class="login-container">
        <h2 class="login-heading">🔐 User Login</h2>
        <form action="{% url 'UserLoginCheck' %}" method="POST">
            {% csrf_token %}
            <div class="form-group mb-3">
                <input type="text" name="loginid" class="form-control" required placeholder="👤 Enter Login ID">
            </div>
            <div class="form-group mb-3">
                <input type="password" name="pswd" class="form-control" required placeholder="🔑 Enter Password">
            </div>
            <div class="form-group text-center mb-2">
                <button type="submit" class="btn btn-login text-white">🚪 Login</button>
            </div>
           
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-success text-center">{{ message }}</div>
                {% endfor %}
            {% endif %}
        </form>
    </div>
</section>

{% endblock %}
